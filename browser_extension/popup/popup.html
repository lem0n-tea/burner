<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Time Tracker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="site">site</div>
      <div class="tracking-status"></div>
      <div class="time">time</div>
      
      <hr />

      <label class="mode-toggle">
        <input type="checkbox" id="modeToggle" />
        Enable whitelist
      </label>

      <hr />

      <button id="fetchStatsBtn">Fetch Weekly Stats</button>

      <div class="stats">
        <div class="stats-row">
          <div class="stats-card">
            <div class="stats-label">Today</div>
            <div class="stats-value" id="todayTotal">--</div>
          </div>
          <div class="stats-card">
            <div class="stats-label">Period</div>
            <div class="stats-value" id="periodTotal">--</div>
          </div>
        </div>

        <div class="section-title">Daily</div>
        <div class="chart" id="dailyChart" aria-label="Daily time chart"></div>

        <div class="section-title">Top sites</div>
        <div class="top-hosts" id="topHosts"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
